# semver bump → tag → D1 마이그레이션 적용 → Cloudflare Workers 배포 → GitHub Release
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Mark GitHub Release as prerelease
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump package.json (semver)
        id: bump
        run: |
          BOT_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git config user.email "$BOT_EMAIL"

          # package.json 버전 bump + 커밋 + 태그 (vX.Y.Z)
          BUMP="${{ inputs.bump }}"
          NEW_VERSION=$(npm version "$BUMP" -m "chore(release): v%s")
          TAG="$NEW_VERSION"
          VERSION="${NEW_VERSION#v}"

          git push origin HEAD
          git push origin "$TAG"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Bumped to $TAG"

  deploy:
    name: Deploy to Cloudflare Workers
    needs: bump
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout ${{ needs.bump.outputs.tag }}
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & test
        run: |
          npm run typecheck
          npm test

      - name: Build web assets
        run: npm run build

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply i-daily --remote

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

  release:
    name: GitHub Release
    needs: [bump, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: ${{ needs.bump.outputs.tag }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
