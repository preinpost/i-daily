# https://taskfile.dev
version: "3"

vars:
  NODE_MODULES: node_modules

tasks:
  default:
    desc: 사용 가능한 태스크 목록
    silent: true
    cmds:
      - task --list

  # ── 개발 ──────────────────────────────────────────────────
  setup:
    desc: 의존성 설치
    cmds:
      - npm install

  dev:
    desc: 개발 서버 (API=wrangler + UI=Vite HMR, 동시 실행)
    aliases: [d]
    cmds:
      - npm run dev

  dev:api:
    desc: API 만 (wrangler dev · D1 로컬)
    cmds:
      - npm run dev:api

  dev:ui:
    desc: UI 만 (Vite · /api 를 dev:api 로 프록시)
    cmds:
      - npm run dev:ui

  # ── 검사 ──────────────────────────────────────────────────
  typecheck:
    desc: TypeScript 타입 체크
    aliases: [tc]
    cmds:
      - npm run typecheck

  test:
    desc: 단위 테스트 (model · store · api — better-sqlite3 in-memory)
    aliases: [t]
    cmds:
      - npm test

  check:
    desc: typecheck + test
    cmds:
      - task: typecheck
      - task: test

  # ── 빌드 / 배포 ───────────────────────────────────────────
  build:
    desc: 웹 SPA 빌드 → dist/web
    aliases: [b]
    cmds:
      - npm run build

  deploy:
    desc: Cloudflare Workers 배포 (빌드 포함)
    cmds:
      - npm run deploy

  types:worker:
    desc: wrangler types (Workers 바인딩 타입 재생성)
    cmds:
      - npm run types:worker

  # ── DB (D1) ───────────────────────────────────────────────
  db:generate:
    desc: Drizzle 스키마 → migrations/*.sql 생성
    cmds:
      - npm run db:generate

  db:migrate:local:
    desc: 로컬 D1 에 마이그레이션 적용
    cmds:
      - npm run db:migrate:local

  db:migrate:remote:
    desc: 원격 D1 에 마이그레이션 적용
    cmds:
      - npm run db:migrate:remote

  db:create:
    desc: 원격 D1 데이터베이스 생성 (최초 1회)
    cmds:
      - npm run db:create

  # ── 유틸 ──────────────────────────────────────────────────
  clean:
    desc: 빌드 산출물 삭제 (dist · .wrangler)
    cmds:
      - rm -rf dist .wrangler

  reinstall:
    desc: node_modules 지우고 재설치
    cmds:
      - rm -rf {{.NODE_MODULES}} package-lock.json
      - npm install
